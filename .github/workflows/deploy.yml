name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          timeout: 120s
          command_timeout: 10m
          script: |
            cd /opt/HCTrading || { echo "Directory not found"; exit 1; }
            git pull origin main || { echo "Git pull failed"; exit 1; }
            chmod +x setup.sh || { echo "chmod failed"; exit 1; }
            ./setup.sh || { echo "setup.sh failed"; exit 1; }
            sudo systemctl restart crypto_manager.service || { echo "Service restart failed"; exit 1; }
            sudo systemctl daemon-reload || { echo "daemon-reload failed"; exit 1; }
